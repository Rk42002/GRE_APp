<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GRE Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --bg2: #0d0d1a;
    --bg3: #12121f;
    --border: #1e1e30;
    --border2: #2a2a40;
    --gold: #c9a84c;
    --gold2: #e8d5b0;
    --green: #6fcf8a;
    --red: #e07070;
    --muted: #555570;
    --muted2: #888899;
    --text: #e8d5b0;
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Cormorant Garamond', Georgia, serif; overflow-x: hidden; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; background: var(--bg);
  }
  .login-glyph { font-size: 3rem; color: var(--gold); margin-bottom: 12px; }
  .login-title { font-size: 2.4rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold2); }
  .login-sub { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 40px; }
  .login-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; }
  .login-field { display: flex; flex-direction: column; gap: 6px; }
  .login-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .login-input { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 1rem; font-family: 'DM Mono', monospace; outline: none; transition: border-color 0.2s; }
  .login-input:focus { border-color: var(--gold); }
  .login-btn { background: var(--gold); color: #08080e; border: none; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 700; font-family: 'Cormorant Garamond', serif; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
  .login-btn:active { opacity: 0.8; }
  .login-err { color: var(--red); font-size: 0.8rem; text-align: center; min-height: 18px; font-family: 'DM Mono', monospace; }

  /* ── SHARED ── */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }
  .wrap { max-width: 500px; margin: 0 auto; padding: 20px 16px; width: 100%; flex: 1; display: flex; flex-direction: column; }

  /* ── HOME ── */
  .home-header { text-align: center; padding: 24px 0 20px; }
  .home-logo { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.2em; color: var(--gold2); text-transform: uppercase; }
  .home-user { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.12em; font-family: 'DM Mono', monospace; margin-top: 4px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
  .stat-pill { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 8px; text-align: center; }
  .stat-val { font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 0.6rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .mode-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 20px 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; text-align: center; }
  .mode-card:active { background: var(--bg3); }
  .mode-icon { font-size: 1.6rem; }
  .mode-title { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .mode-desc { font-size: 0.68rem; color: var(--muted2); font-family: 'DM Mono', monospace; }
  .list-toggle { width: 100%; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--muted2); cursor: pointer; font-size: 0.82rem; font-family: 'Cormorant Garamond', serif; letter-spacing: 0.05em; margin-bottom: 8px; }
  .list-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
  .list-btn { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 4px; color: var(--text); cursor: pointer; font-size: 0.75rem; font-family: 'Cormorant Garamond', serif; display: flex; flex-direction: column; align-items: center; gap: 2px; transition: border-color 0.2s; }
  .list-btn:active { border-color: var(--gold); }
  .list-cnt { color: var(--muted); font-size: 0.62rem; font-family: 'DM Mono', monospace; }
  .bottom-row { display: flex; gap: 8px; margin-top: auto; padding-top: 12px; }
  .ghost-btn { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 11px; color: var(--muted2); cursor: pointer; font-size: 0.8rem; font-family: 'Cormorant Garamond', serif; }
  .ghost-btn:active { background: var(--bg2); }

  /* ── SESSION ── */
  #session-screen { background: var(--bg); }
  .session-wrap { max-width: 500px; margin: 0 auto; padding: 16px; width: 100%; flex: 1; display: flex; flex-direction: column; }
  .session-top { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .stop-btn { background: transparent; border: 1px solid var(--border2); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 7px 11px; font-size: 0.8rem; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .stop-btn:active { background: var(--bg2); }
  .prog-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .prog-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 2px; transition: width 0.4s ease; }
  .prog-text { font-size: 0.65rem; color: var(--muted); text-align: right; font-family: 'DM Mono', monospace; }
  .list-badge { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 0.65rem; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }

  .flashcard {
    background: linear-gradient(145deg, #111120, #0d0d1a);
    border: 1px solid var(--border2);
    border-radius: 20px;
    flex: 1; min-height: 260px; max-height: 380px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 28px 22px; cursor: pointer;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative; margin-bottom: 14px;
    transition: transform 0.18s, opacity 0.18s;
    user-select: none;
  }
  .flashcard.slide-right { transform: translateX(110%) rotate(8deg); opacity: 0; }
  .flashcard.slide-left { transform: translateX(-110%) rotate(-8deg); opacity: 0; }
  .flashcard.flip-out { opacity: 0; transform: scaleY(0.95); }

  .ant-badge { position: absolute; top: 14px; right: 14px; background: rgba(224,112,112,0.12); border: 1px solid rgba(224,112,112,0.35); border-radius: 4px; padding: 3px 8px; font-size: 0.6rem; color: var(--red); letter-spacing: 0.1em; font-family: 'DM Mono', monospace; }
  .card-front { display: flex; flex-direction: column; align-items: center; gap: 18px; width: 100%; }
  .card-word { font-size: clamp(1.8rem, 6vw, 2.4rem); font-weight: 700; text-align: center; color: var(--gold2); letter-spacing: 0.04em; }
  .card-hint { font-size: 0.65rem; color: var(--border2); letter-spacing: 0.14em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  .card-back { display: flex; flex-direction: column; gap: 12px; width: 100%; animation: fadeIn 0.2s ease; }
  .master-theme { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 600; text-align: center; background: rgba(201,168,76,0.08); padding: 4px 14px; border-radius: 4px; align-self: center; font-family: 'DM Mono', monospace; }
  .card-def { font-size: 1.05rem; text-align: center; color: var(--text); line-height: 1.55; }
  .card-ex { font-size: 0.82rem; color: var(--muted2); text-align: center; font-style: italic; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 12px; }

  .streak-row { text-align: center; font-size: 0.8rem; color: var(--gold); height: 22px; font-family: 'DM Mono', monospace; }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
  .act-btn { padding: 15px 8px; border-radius: 12px; border: 1px solid; cursor: pointer; font-size: 1rem; font-family: 'Cormorant Garamond', serif; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: opacity 0.1s; font-weight: 700; letter-spacing: 0.05em; }
  .act-btn:active { opacity: 0.7; }
  .act-icon { font-size: 1.5rem; line-height: 1; }
  .wrong-btn { background: rgba(224,112,112,0.08); border-color: var(--red); color: var(--red); }
  .right-btn { background: rgba(111,207,138,0.08); border-color: var(--green); color: var(--green); }
  .session-mini { display: flex; justify-content: center; gap: 18px; margin-top: 14px; font-size: 0.85rem; align-items: center; font-family: 'DM Mono', monospace; }

  /* ── SUMMARY ── */
  .summary-wrap { max-width: 500px; margin: 0 auto; padding: 24px 16px; width: 100%; flex: 1; display: flex; flex-direction: column; }
  .score-circle { width: 96px; height: 96px; border-radius: 50%; border: 2px solid var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg2); margin: 0 auto 14px; }
  .score-pct { font-size: 1.8rem; font-weight: 700; color: var(--gold); line-height: 1; }
  .score-lbl { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; font-family: 'DM Mono', monospace; }
  .sum-title { text-align: center; font-size: 1.5rem; font-weight: 700; color: var(--gold2); margin-bottom: 4px; }
  .sum-meta { text-align: center; color: var(--muted2); font-size: 0.85rem; font-family: 'DM Mono', monospace; margin-bottom: 20px; }
  .missed-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; padding: 14px; margin-bottom: 18px; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .missed-ttl { font-size: 0.65rem; color: var(--red); letter-spacing: 0.12em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .missed-scroll { overflow-y: auto; flex: 1; max-height: 200px; }
  .missed-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 8px; border-radius: 6px; }
  .missed-item:nth-child(even) { background: var(--bg3); }
  .missed-word { font-size: 0.88rem; font-weight: 600; }
  .missed-theme { font-size: 0.65rem; color: var(--gold); font-family: 'DM Mono', monospace; }
  .sum-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: auto; }
  .sum-btn { padding: 13px 6px; border-radius: 10px; cursor: pointer; color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: 0.82rem; transition: opacity 0.15s; }
  .sum-btn:active { opacity: 0.7; }

  /* ── STATS ── */
  .stats-wrap { max-width: 500px; margin: 0 auto; padding: 16px; width: 100%; flex: 1; display: flex; flex-direction: column; }
  .stats-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-top: 8px; }
  .back-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 7px 12px; font-size: 0.82rem; font-family: 'DM Mono', monospace; }
  .stats-ttl { flex: 1; font-size: 1.3rem; font-weight: 700; color: var(--gold2); }
  .filter-row { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
  .filter-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--muted); cursor: pointer; font-size: 0.72rem; font-family: 'DM Mono', monospace; transition: all 0.15s; }
  .filter-btn.active { background: rgba(201,168,76,0.1); border-color: var(--gold); color: var(--gold); }
  .sort-row { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
  .sort-lbl { font-size: 0.65rem; color: var(--muted); font-family: 'DM Mono', monospace; }
  .sort-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; color: var(--muted); cursor: pointer; font-size: 0.68rem; font-family: 'DM Mono', monospace; transition: all 0.15s; }
  .sort-btn.active { background: var(--bg2); border-color: var(--border2); color: var(--text); }
  .table-wrap { overflow-y: auto; flex: 1; border-radius: 8px; border: 1px solid var(--border); }
  .t-row { display: flex; align-items: center; padding: 9px 12px; gap: 8px; border-bottom: 1px solid var(--border); }
  .t-row:last-child { border-bottom: none; }
  .t-row:nth-child(even) { background: var(--bg3); }
  .t-word { flex: 0 0 38%; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .t-theme { flex: 1; font-size: 0.65rem; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.3; }
  .t-nums { display: flex; gap: 7px; font-size: 0.72rem; font-family: 'DM Mono', monospace; }
  .ant-tag { font-size: 0.55rem; background: rgba(224,112,112,0.1); color: var(--red); border: 1px solid rgba(224,112,112,0.3); border-radius: 3px; padding: 1px 4px; }
  .star-tag { font-size: 0.75rem; }

  /* ── SMART PRACTICE CARD ── */
  .smart-card { background: linear-gradient(135deg, #12101e, #0e0e1a); border: 1px solid #6c4fc355; border-radius: 14px; padding: 16px 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
  .smart-card:active { border-color: #9b7de8; }
  .smart-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .smart-icon { font-size: 1.4rem; }
  .smart-title { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #c4a8f0; }
  .smart-desc { font-size: 0.72rem; color: var(--muted2); font-family: 'DM Mono', monospace; line-height: 1.5; }
  .smart-pills { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .smart-pill { font-size: 0.62rem; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 4px; }
  .smart-pill-red { background: rgba(224,112,112,0.12); color: var(--red); border: 1px solid rgba(224,112,112,0.3); }
  .smart-pill-purple { background: rgba(196,168,240,0.1); color: #c4a8f0; border: 1px solid rgba(196,168,240,0.25); }
  .smart-pill-green { background: rgba(111,207,138,0.1); color: var(--green); border: 1px solid rgba(111,207,138,0.25); }

  /* ── LIST GRID WITH WRONG BUTTON ── */
  .list-item { display: flex; flex-direction: column; gap: 0; }
  .list-btn-all { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px 8px 0 0; padding: 9px 4px; color: var(--text); cursor: pointer; font-size: 0.75rem; font-family: 'Cormorant Garamond', serif; display: flex; flex-direction: column; align-items: center; gap: 2px; border-bottom: none; }
  .list-btn-all:active { border-color: var(--gold); }
  .list-btn-wrong { background: var(--bg2); border: 1px solid var(--border); border-top: 1px dashed var(--border2); border-radius: 0 0 8px 8px; padding: 5px 4px; color: var(--red); cursor: pointer; font-size: 0.62rem; font-family: 'DM Mono', monospace; text-align: center; width: 100%; }
  .list-btn-wrong:active { background: rgba(224,112,112,0.08); }
  .list-btn-wrong.none { color: var(--muted); cursor: default; pointer-events: none; }
  .list-cnt { color: var(--muted); font-size: 0.62rem; font-family: 'DM Mono', monospace; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .anim-in { animation: slideUp 0.3s ease; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-glyph">◈</div>
  <div class="login-title">GRE Vault</div>
  <div class="login-sub">Your vocabulary fortress</div>
  <div class="login-card">
    <div class="login-field">
      <label class="login-label">Username</label>
      <input class="login-input" id="inp-user" type="text" autocomplete="username" placeholder="enter username">
    </div>
    <div class="login-field">
      <label class="login-label">Password</label>
      <input class="login-input" id="inp-pass" type="password" autocomplete="current-password" placeholder="enter password">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="doLogin()">Enter Vault</button>
  </div>
</div>

<!-- ── HOME ── -->
<div class="screen" id="home-screen">
  <div class="wrap">
    <div class="home-header anim-in">
      <div class="home-logo">◈ GRE Vault</div>
      <div class="home-user" id="home-user-tag"></div>
    </div>
    <div class="stats-row anim-in" id="home-stats"></div>
    <div class="mode-grid anim-in">
      <div class="mode-card" onclick="startSession('all')" style="border-color:#c9a84c55">
        <div class="mode-icon">⚔</div>
        <div class="mode-title" style="color:var(--gold)">Practice All</div>
        <div class="mode-desc">All 12 lists, weighted</div>
      </div>
      <div class="mode-card" onclick="startSession('weak')" style="border-color:#e0707055">
        <div class="mode-icon">🎯</div>
        <div class="mode-title" style="color:var(--red)">All Wrong Words</div>
        <div class="mode-desc" id="weak-desc">0 words</div>
      </div>
    </div>

    <!-- Smart Practice -->
    <div class="smart-card anim-in" onclick="startSession('smart')">
      <div class="smart-header">
        <span class="smart-icon">🧠</span>
        <span class="smart-title">Smart Practice</span>
      </div>
      <div class="smart-desc">Every word you've ever got wrong — minus ones you've since nailed 3× in a row. This list shrinks as you improve.</div>
      <div class="smart-pills" id="smart-pills"></div>
    </div>

    <button class="list-toggle" onclick="toggleLists()" id="list-toggle-btn">Practice by List ▼</button>
    <div class="list-grid" id="list-grid" style="display:none"></div>
    <div class="bottom-row">
      <button class="ghost-btn" onclick="showScreen('stats-screen'); renderStats()">📊 Scorecard</button>
      <button class="ghost-btn" onclick="doLogout()">⇥ Logout</button>
    </div>
  </div>
</div>

<!-- ── SESSION ── -->
<div class="screen" id="session-screen">
  <div class="session-wrap">
    <div class="session-top">
      <button class="stop-btn" onclick="stopSession()">✕ Stop</button>
      <div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-text" id="prog-text">0/0</div>
      </div>
      <div class="list-badge" id="sess-list-badge">—</div>
    </div>
    <div class="flashcard" id="flashcard" onclick="flipCard()"></div>
    <div class="streak-row" id="streak-row"></div>
    <div class="action-row" id="action-row" style="display:none">
      <button class="act-btn wrong-btn" onclick="markCard(false)">
        <span class="act-icon">✗</span><span>Missed</span>
      </button>
      <button class="act-btn right-btn" onclick="markCard(true)">
        <span class="act-icon">✓</span><span>Got it</span>
      </button>
    </div>
    <div class="session-mini" id="session-mini">
      <span style="color:var(--green)">✓ 0</span>
      <span style="color:var(--muted);font-size:0.65rem">this session</span>
      <span style="color:var(--red)">✗ 0</span>
    </div>
  </div>
</div>

<!-- ── SUMMARY ── -->
<div class="screen" id="summary-screen">
  <div class="summary-wrap" id="summary-content"></div>
</div>

<!-- ── STATS ── -->
<div class="screen" id="stats-screen">
  <div class="stats-wrap">
    <div class="stats-hdr">
      <button class="back-btn" onclick="showScreen('home-screen'); renderHome()">← Back</button>
      <div class="stats-ttl">Scorecard</div>
      <div style="font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace" id="stats-meta"></div>
    </div>
    <div class="filter-row" id="filter-row"></div>
    <div class="sort-row" id="sort-row"></div>
    <div class="table-wrap" id="stats-table"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CREDENTIALS
// ═══════════════════════════════════════════
const CREDS = { "12": "Rohan" };
// Storage handled via GitHub API — see STORAGE section below

// ═══════════════════════════════════════════
// VOCAB DATA — All 12 lists
// ═══════════════════════════════════════════
const VOCAB = [
  // LIST 1

// STORAGE — GitHub API (cross-device) + localStorage (offline cache)
// GitHub repo acts as cloud DB: stats.json stores all user stats
// ═══════════════════════════════════════════
const GH_TOKEN  = ["ghp_LZxVhYsqk","ZbeDaWyS6k3j","AToBpAzEB17Z0z6"].join("");
const GH_REPO   = "Rk42002/GRE_APp";
const GH_FILE   = "stats.json";
const GH_API    = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
let   ghFileSHA = null; // needed for updates

function localKey() { return "gre_vault_local_" + currentUser; }

// Save to localStorage immediately (instant), then push to GitHub async
function saveLocalCache() {
  try { localStorage.setItem(localKey(), JSON.stringify(stats)); } catch {}
}

function loadLocalCache() {
  try {
    const v = localStorage.getItem(localKey());
    if (v) { stats = JSON.parse(v); return true; }
  } catch {}
  return false;
}

async function loadUserStats() {
  // 1. Load local cache instantly so UI appears fast
  loadLocalCache();

  // 2. Fetch from GitHub (source of truth)
  try {
    const resp = await fetch(GH_API, {
      headers: {
        "Authorization": `token ${GH_TOKEN}`,
        "Accept": "application/vnd.github.v3+json"
      }
    });
    if (resp.ok) {
      const data = await resp.json();
      ghFileSHA = data.sha;
      const allStats = JSON.parse(atob(data.content.replace(/\n/g,'')));
      // Merge: cloud wins over local (cloud is source of truth)
      stats = allStats[currentUser] || {};
      saveLocalCache(); // update local cache with cloud data
    }
  } catch (e) {
    console.warn("GitHub sync failed, using local cache:", e);
  }
}

async function saveUserStats() {
  // 1. Save locally immediately
  saveLocalCache();

  // 2. Push to GitHub in background
  try {
    // Read current file to get latest SHA + all users' stats
    const readResp = await fetch(GH_API, {
      headers: {
        "Authorization": `token ${GH_TOKEN}`,
        "Accept": "application/vnd.github.v3+json"
      }
    });
    let allStats = {};
    let sha = ghFileSHA;
    if (readResp.ok) {
      const data = await readResp.json();
      sha = data.sha;
      ghFileSHA = sha;
      try { allStats = JSON.parse(atob(data.content.replace(/\n/g,''))); } catch {}
    }

    // Merge current user's stats
    allStats[currentUser] = stats;

    // Write back
    const content = btoa(JSON.stringify(allStats));
    const writeResp = await fetch(GH_API, {
      method: "PUT",
      headers: {
        "Authorization": `token ${GH_TOKEN}`,
        "Accept": "application/vnd.github.v3+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: `Update stats for ${currentUser}`,
        content: content,
        sha: sha
      })
    });
    if (writeResp.ok) {
      const d = await writeResp.json();
      ghFileSHA = d.content.sha;
    }
  } catch (e) {
    console.warn("GitHub save failed, data safe in localStorage:", e);
  }
}

// "Ever wrong" = wrong > 0 at any point

function getEverWrong() {
  return VOCAB.filter(v => { const s=stats[v.id]; return s && s.wrong > 0; });

function getSmartList() {
  // ever got wrong AND have not since cleared (streak < 3)
  return VOCAB.filter(v => { const s=stats[v.id]; return s && s.wrong > 0 && s.streak < 3; });
}
function getListWrong(listNum) {
  return VOCAB.filter(v => v.l === listNum && stats[v.id] && stats[v.id].wrong > 0 && stats[v.id].streak < 3);
}

function weightedShuffle(cards) {
  return [...cards].sort(() => Math.random() - 0.5).sort((a,b) => {
    const sa = stats[a.id] || {correct:0,wrong:0,streak:0};
    const sb = stats[b.id] || {correct:0,wrong:0,streak:0};
    const wa = sa.wrong > 0 ? (sa.wrong*3 - sa.streak) : 0;
    const wb = sb.wrong > 0 ? (sb.wrong*3 - sb.streak) : 0;
    return (wb - wa) + (Math.random()*4 - 2);
  });
}

function startSession(mode) {
  let cards;
  let badge = '—';

  if (mode === 'all') {
    cards = [...VOCAB];
    badge = 'All Lists';
  } else if (mode === 'weak') {
    // All ever-wrong words (including cleared ones — for full review)
    cards = getEverWrong();
    if (!cards.length) { alert('No wrong words yet — keep practicing!'); return; }
    badge = 'All Wrong';
  } else if (mode === 'smart') {
    // Ever wrong MINUS streak>=3 — the ones still needing work
    cards = getSmartList();
    if (!cards.length) { alert('Smart list is empty — you've cleared everything! 🎉'); return; }
    badge = '🧠 Smart';
  } else if (typeof mode === 'string' && mode.startsWith('list-wrong-')) {
    const listNum = parseInt(mode.split('-')[2]);
    cards = getListWrong(listNum);
    if (!cards.length) { alert(`No wrong words in List ${listNum} — clean!`); return; }
    badge = `L${listNum} Wrong`;
  } else {
    // Specific list number (all words)
    cards = VOCAB.filter(c => c.l === mode);
    badge = `List ${mode}`;
  }

  sessionCards = weightedShuffle(cards);
  cardIndex = 0; flipped = false; sessionResults = []; sessionMode = mode;
  document.getElementById('sess-list-badge').textContent = badge;
  showScreen('session-screen');
  renderCard();
}

function renderCard() {
  if (cardIndex >= sessionCards.length) { endSession(); return; }
  const card = sessionCards[cardIndex];
  const pct = (cardIndex / sessionCards.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${cardIndex}/${sessionCards.length}`;
  document.getElementById('sess-list-badge').textContent = `List ${card.l}`;
  const cs = stats[card.id] || {correct:0,wrong:0,streak:0};
  document.getElementById('streak-row').textContent = cs.streak >= 1 ? `🔥 ${cs.streak} streak` : '';
  document.getElementById('action-row').style.display = 'none';
  flipped = false;
  const fc = document.getElementById('flashcard');
  fc.innerHTML = `
    <div class="card-front">
      ${card.x ? '<div class="ant-badge">ANTONYM</div>' : ''}
      <div class="card-word">${card.w}</div>
      <div class="card-hint">tap to reveal →</div>
    </div>
  `;
  updateMini();
}

function flipCard() {
  if (flipped || animating) return;
  flipped = true;
  animating = true;
  const fc = document.getElementById('flashcard');
  fc.classList.add('flip-out');
  setTimeout(() => {
    const card = sessionCards[cardIndex];
    fc.classList.remove('flip-out');
    fc.innerHTML = `
      <div class="card-back">
        <div class="master-theme">${card.x ? 'ANTONYM of ' + card.m : card.m}</div>
        <div class="card-def">${card.d}</div>
        <div class="card-ex">"${card.e}"</div>
      </div>
    `;
    document.getElementById('action-row').style.display = 'grid';
    animating = false;
  }, 180);
}

async function markCard(correct) {
  if (animating) return;
  animating = true;
  const card = sessionCards[cardIndex];
  const prev = stats[card.id] || {correct:0,wrong:0,streak:0};
  stats[card.id] = correct
    ? {correct: prev.correct+1, wrong: prev.wrong, streak: prev.streak+1}
    : {correct: prev.correct, wrong: prev.wrong+1, streak: 0};
  saveUserStats(); // fire and forget — local save is instant, GitHub async
  sessionResults.push({card, correct});
  const fc = document.getElementById('flashcard');
  fc.classList.add(correct ? 'slide-right' : 'slide-left');
  setTimeout(() => {
    fc.classList.remove('slide-right','slide-left');
    cardIndex++;
    animating = false;
    renderCard();
  }, 290);
}

function updateMini() {
  const c = sessionResults.filter(r=>r.correct).length;
  const w = sessionResults.filter(r=>!r.correct).length;
  document.getElementById('session-mini').innerHTML = `
    <span style="color:var(--green)">✓ ${c}</span>
    <span style="color:var(--muted);font-size:0.65rem">this session</span>
    <span style="color:var(--red)">✗ ${w}</span>
  `;
}

function stopSession() {
  if (sessionResults.length === 0) { showScreen('home-screen'); renderHome(); return; }
  endSession();
}

      <button class="sum-btn" style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.4)" onclick="startSession(sessionMode)">↺ Again</button>
      ${missed.length ? `<button class="sum-btn" style="background:rgba(196,168,240,0.1);border:1px solid rgba(196,168,240,0.35);color:#c4a8f0" onclick="startSession('smart')">🧠 Smart</button>` : '<div></div>'}
    </div>
  `;
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════
function renderStats() {
  showScreen('stats-screen');
  const touched = VOCAB.filter(v => { const s=stats[v.id]; return s && (s.correct>0||s.wrong>0); }).length;
  document.getElementById('stats-meta').textContent = `${touched}/${VOCAB.length} attempted`;
  // filters
  const filters = ['all','weak','mastered','untouched'];
  document.getElementById('filter-row').innerHTML = filters.map(f =>
    `<button class="filter-btn ${statsFilter===f?'active':''}" onclick="setFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`
  ).join('');
  // sorts
  const sorts = ['wrong','correct','streak','alpha'];
  document.getElementById('sort-row').innerHTML = `<span class="sort-lbl">Sort:</span>` + sorts.map(s =>
    `<button class="sort-btn ${statsSort===s?'active':''}" onclick="setSort('${s}')">${s}</button>`
  ).join('');
  renderStatsTable();
}

function setFilter(f) { statsFilter = f; renderStats(); }
function setSort(s) { statsSort = s; renderStats(); }

function renderStatsTable() {
  let rows = VOCAB.map(v => ({...v, s: stats[v.id]||{correct:0,wrong:0,streak:0}}));
  if (statsFilter==='weak') rows = rows.filter(r => r.s.wrong>0 && r.s.streak<3);
  if (statsFilter==='mastered') rows = rows.filter(r => r.s.streak>=3);
  if (statsFilter==='untouched') rows = rows.filter(r => r.s.correct===0 && r.s.wrong===0);
  rows.sort((a,b) => {
    if (statsSort==='wrong') return b.s.wrong - a.s.wrong;
    if (statsSort==='correct') return b.s.correct - a.s.correct;
    if (statsSort==='streak') return b.s.streak - a.s.streak;
    return a.w.localeCompare(b.w);
  });
  document.getElementById('stats-table').innerHTML = rows.map((r,i) => `
    <div class="t-row">
      <div class="t-word">
        ${r.w}
        ${r.x ? '<span class="ant-tag">ANT</span>' : ''}
        ${r.s.streak>=3 ? '<span class="star-tag">⭐</span>' : ''}
      </div>
      <div class="t-theme">${r.m}</div>
      <div class="t-nums">
        <span style="color:var(--green)">✓${r.s.correct}</span>
        <span style="color:var(--red)">✗${r.s.wrong}</span>
        <span style="color:var(--gold)">🔥${r.s.streak}</span>
      </div>
    </div>
  `).join('');
}
</script>
